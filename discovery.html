<!DOCTYPE html>
<html>
<head>
    <title>Neon ID Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <h1 class="text-2xl font-bold mb-5">Neon CRM Waiver ID Finder</h1>
    <p class="mb-5 text-slate-400">Click the button below to scan all your Neon fields for the word "Waiver".</p>
    
    <button onclick="findID()" class="bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-lg font-bold">
        Scan My Neon CRM
    </button>

    <div id="results" class="mt-10 space-y-4"></div>

    <script>
        async function findID() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Searching...";
            
            // We check the categories one by one through your existing proxy
            const categories = ['Individual', 'Account', 'Common'];
            let found = false;

            for (const cat of categories) {
                try {
                    const response = await fetch(`/api/v2/customFields?category=${cat}`);
                    const fields = await response.json();
                    
                    // Look for the Waiver field
                    const match = fields.find(f => 
                        (f.name && f.name.toLowerCase().includes("waiver")) || 
                        (f.displayName && f.displayName.toLowerCase().includes("waiver"))
                    );

                    if (match) {
                        resultsDiv.innerHTML = `
                            <div class="bg-green-900 border border-green-500 p-6 rounded-lg">
                                <h2 class="text-xl font-bold text-green-400">✅ Field Found!</h2>
                                <p class="mt-2"><strong>Field Name:</strong> ${match.name}</p>
                                <p><strong>Field ID:</strong> <span class="text-yellow-400 text-2xl font-mono">${match.id}</span></p>
                                <p><strong>Category:</strong> ${cat}</p>
                            </div>`;
                        found = true;
                        break;
                    }
                } catch (e) {
                    console.error(e);
                }
            }

            if (!found) {
                resultsDiv.innerHTML = "<div class='text-red-400'>❌ No field with 'Waiver' found. Try checking 'Settings > Custom Fields' in Neon to see the exact name.</div>";
            }
        }
    </script>
</body>
</html>
