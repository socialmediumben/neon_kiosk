<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Ultimate Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-6">Neon CRM Debugger</h1>
        
        <div class="space-y-4">
            <button onclick="testEndpoint('/v2/users')" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">
                Test 1: Fetch System Users
            </button>
            
            <button onclick="testEndpoint('/v2/accounts?pageSize=1')" class="w-full py-3 bg-blue-600 text-white rounded-lg font-bold">
                Test 2: Fetch Any Account
            </button>
        </div>

        <div class="mt-8 p-4 bg-black rounded-lg">
            <p class="text-green-400 font-mono text-xs uppercase mb-2">Console Output:</p>
            <pre id="console" class="text-white font-mono text-sm overflow-auto max-h-64">Waiting for input...</pre>
        </div>
    </div>

    <script>
        async function testEndpoint(path) {
            const output = document.getElementById('console');
            output.textContent = `Calling ${path}...`;
            
            try {
                const res = await fetch(`${window.location.origin}/api${path}`);
                const data = await res.json();
                
                // Pretty-print the actual JSON response
                output.textContent = JSON.stringify(data, null, 2);
                
                if (res.status === 200 && (!data.accounts || data.accounts.length === 0) && (!data.users || data.users.length === 0)) {
                    output.textContent += "\n\n⚠️ NOTE: Request successful, but list is empty.";
                }
            } catch (e) {
                output.textContent = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
