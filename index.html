<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon CRM Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stage { display: none; }
        .active-stage { display: block; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #0891b2; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-lg text-center">
        <div id="stage-search" class="stage active-stage">
            <h1 class="text-4xl font-bold text-gray-800">Customer Check-In</h1>
            <p class="text-gray-500 my-4">Enter your phone number.</p>
            <input type="tel" id="search-input" class="w-full p-4 text-2xl border rounded-md mb-4 text-center" placeholder="5555555555">
            <button onclick="searchAccounts()" class="w-full py-4 bg-cyan-600 text-white rounded-xl text-xl hover:bg-cyan-700 transition">Search</button>
        </div>

        <div id="stage-results" class="stage">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">Who is checking in?</h1>
            <div id="results-list" class="space-y-4"></div>
            <div class="flex space-x-4 mt-8">
                <button onclick="showStage('stage-search')" class="flex-1 py-4 border-2 rounded-xl text-xl">Back</button>
                <button onclick="checkInSelected()" id="checkin-btn" disabled class="flex-[2] py-4 bg-gray-400 text-white rounded-xl text-xl">Check In</button>
            </div>
        </div>

        <div id="stage-success" class="stage">
            <h1 class="text-4xl font-bold text-green-600">Success!</h1>
            <p class="my-6 text-xl text-gray-600">You are checked in.</p>
            <button onclick="location.reload()" class="w-full py-4 bg-cyan-600 text-white rounded-xl text-xl">Done</button>
        </div>

        <div id="loader" class="hidden mt-6 flex flex-col items-center">
            <div class="spinner"></div>
            <p class="mt-2 text-gray-500" id="loader-text">Loading...</p>
        </div>
    </div>

    <script>
        const API_PROXY_URL = window.location.origin; 
        const SYSTEM_USER_ID = "1153";
        let selectedAccounts = [];

        async function searchAccounts() {
            const phone = document.getElementById('search-input').value.replace(/\D/g, '');
            if (phone.length < 4) return alert("Enter at least 4 digits.");

            setLoading(true, 'Searching...');
            
            try {
                const res = await fetch(`${API_PROXY_URL}/api/v2/accounts/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        searchFields: [{ field: "Phone", operator: "CONTAIN", value: phone }],
                        outputFields: ["First Name", "Last Name", "Account ID", "Account Custom Fields", "Common Custom Fields", "Individual Custom Fields"]
                    })
                });
                const data = await res.json();
                renderResults(data.searchResults || []);
            } catch (e) { alert(e.message); }
            finally { setLoading(false); }
        }

        function renderResults(accounts) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            
            if (accounts.length === 0) {
                list.innerHTML = '<p class="text-gray-500 py-4">No accounts found.</p>';
            }

            accounts.forEach(acc => {
                const allFields = [
                    ...(acc["Account Custom Fields"] || []), 
                    ...(acc["Common Custom Fields"] || []),
                    ...(acc["Individual Custom Fields"] || [])
                ];
                
                // Debug: Log found fields to the browser console
                console.log(`Fields for ${acc["First Name"]}:`, allFields.map(f => f.fieldName));

                const waiverField = allFields.find(f => 
                    f.fieldName && f.fieldName.toLowerCase().includes("waiver")
                );
                
                const isSigned = waiverField && waiverField.value && waiverField.value.trim() !== "";

                const div = document.createElement('div');
                div.className = `p-4 border-2 rounded-xl cursor-pointer text-xl font-bold ${!isSigned ? 'bg-red-50 border-red-200' : 'bg-white'}`;
                
                if (!isSigned) {
                    div.innerHTML = `${acc["First Name"]} ${acc["Last Name"]} <br><span class="text-sm text-red-600 font-normal">Waiver Required</span>`;
                } else {
                    div.textContent = `${acc["First Name"]} ${acc["Last Name"]}`;
                    div.onclick = () => toggleSelect(acc, div);
                }
                list.appendChild(div);
            });
            showStage('stage-results');
        }

        function toggleSelect(acc, element) {
            const idx = selectedAccounts.indexOf(acc);
            if(idx > -1) {
                selectedAccounts.splice(idx, 1);
                element.classList.remove('bg-cyan-50', 'border-cyan-600');
            } else {
                selectedAccounts.push(acc);
                element.classList.add('bg-cyan-50', 'border-cyan-600');
            }
            const btn = document.getElementById('checkin-btn');
            btn.disabled = selectedAccounts.length === 0;
            btn.className = selectedAccounts.length === 0 ? "flex-[2] py-4 bg-gray-400 text-white rounded-xl text-xl" : "flex-[2] py-4 bg-cyan-600 text-white rounded-xl text-xl";
        }

        async function checkInSelected() {
            setLoading(true, 'Checking In...');
            const now = new Date();
            try {
                for (const acc of selectedAccounts) {
                    await fetch(`${API_PROXY_URL}/api/v2/activities`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            subject: "Check-In",
                            status: "Completed",
                            accountId: acc["Account ID"],
                            assignedTo: SYSTEM_USER_ID,
                            startDate: now.toISOString().split('T')[0],
                            startTime: now.toTimeString().split(' ')[0].substring(0, 5)
                        })
                    });
                }
                showStage('stage-success');
            } catch (e) { alert(e.message); }
            finally { setLoading(false); }
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active-stage'));
            document.getElementById(id).classList.add('active-stage');
        }

        function setLoading(isLoading, text) {
            const loader = document.getElementById('loader');
            document.getElementById('loader-text').textContent = text;
            loader.classList.toggle('hidden', !isLoading);
        }
    </script>
</body>
</html>
