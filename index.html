<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon CRM Bulk Sync Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-8 rounded-2xl shadow-lg text-center">
            <h1 class="text-3xl font-bold mb-2">Neon CRM Sync</h1>
            <p id="sync-status" class="text-blue-600 font-semibold mb-6">Initializing sync...</p>
            
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button id="view-table-btn" disabled onclick="toggleTable()" class="px-6 py-3 bg-slate-800 text-white rounded-lg font-bold opacity-50">
                    View Lookup Table
                </button>
                <button onclick="location.reload()" class="px-6 py-3 border-2 border-slate-800 rounded-lg font-bold">
                    Restart Sync
                </button>
            </div>
        </div>

        <div id="table-container" class="hidden bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
            <h2 class="text-xl font-bold mb-4">Internal Lookup Table (<span id="count-display">0</span> records)</h2>
            <div class="overflow-x-auto max-h-[500px] overflow-y-auto border rounded">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 sticky top-0">
                        <tr>
                            <th class="p-3 border-b">ID</th>
                            <th class="p-3 border-b">First Name</th>
                            <th class="p-3 border-b">Last Name</th>
                            <th class="p-3 border-b">Email</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_PROXY_URL = window.location.origin;
        let accountLookupTable = [];

        window.onload = async () => {
            let currentPage = 0;
            let totalPages = 1;
            const statusEl = document.getElementById('sync-status');

            try {
                while (currentPage < totalPages) {
                    statusEl.textContent = `Syncing Batch ${currentPage + 1}...`;
                    
                    const res = await fetch(`${API_PROXY_URL}/discovery/bulk-accounts?page=${currentPage}`);
                    const data = await res.json();

                    if (data.accounts) {
                        accountLookupTable = accountLookupTable.concat(data.accounts);
                        totalPages = data.pagination.totalPages;
                        currentPage++;
                    } else {
                        throw new Error("Invalid response from server");
                    }
                }

                statusEl.textContent = `✅ Sync Complete: ${accountLookupTable.length} accounts loaded.`;
                statusEl.className = "text-green-600 font-bold mb-6";
                
                // Enable the view button
                const btn = document.getElementById('view-table-btn');
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'bg-slate-800');
                btn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                
                populateTable();
            } catch (e) {
                statusEl.textContent = "❌ Sync failed: " + e.message;
                statusEl.className = "text-red-600 font-bold mb-6";
            }
        };

        function populateTable() {
            const body = document.getElementById('table-body');
            document.getElementById('count-display').textContent = accountLookupTable.length;
            
            body.innerHTML = accountLookupTable.map(acc => `
                <tr>
                    <td class="p-3 font-mono text-xs">${acc.accountId}</td>
                    <td class="p-3">${acc.firstName || ''}</td>
                    <td class="p-3">${acc.lastName || ''}</td>
                    <td class="p-3 text-slate-500">${acc.email || 'N/A'}</td>
                </tr>
            `).join('');
        }

        function toggleTable() {
            const container = document.getElementById('table-container');
            container.classList.toggle('hidden');
        }
    </script>
</body>
</html>
