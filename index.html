<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Medium ID Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .stage { display: none; }
        .active-stage { display: block; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 32px; height: 32px; border-radius: 50%; border-left-color: #0891b2; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            body * { visibility: hidden; }
            #nametag-to-print, #nametag-to-print * { visibility: visible !important; }
            #nametag-to-print {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4 text-center">

    <div id="main-container" class="w-full max-w-5xl bg-white p-10 rounded-3xl shadow-2xl no-print">
        
        <div id="stage-search" class="stage active-stage">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-2">Check-In</h1>
            <p class="text-gray-500 mb-8">Enter your Account ID or Last Name.</p>
            <input type="text" id="search-input" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') handleSearch()" class="w-full max-w-lg p-5 text-3xl border-2 border-gray-100 rounded-2xl mb-6 text-center focus:border-cyan-500 outline-none transition-all mx-auto block" placeholder="ID or Last Name">
            <button onclick="handleSearch()" class="w-full max-w-lg py-5 bg-cyan-600 text-white rounded-2xl text-2xl font-bold hover:bg-cyan-700 shadow-lg mb-6 mx-auto block">Search</button>
            <div class="border-t border-gray-100 pt-6">
                <button onclick="showWaiverOnly()" class="w-full max-w-lg py-4 bg-emerald-600 text-white rounded-2xl text-xl font-bold shadow-md mx-auto block">Sign the Waiver</button>
            </div>
        </div>

        <div id="stage-results" class="stage">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Select Your Account</h1>
            <div id="results-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6"></div>
            <button onclick="showStage('stage-search')" class="text-gray-400 font-semibold hover:underline">Back to Search</button>
        </div>

        <div id="stage-waiver" class="stage">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Sign Waiver</h1>
            <div id="qrcode-direct" class="mb-6 flex justify-center bg-white p-4 rounded-lg inline-block mx-auto border border-gray-100"></div>
            <div class="mb-8 text-xl">
                <a href="https://socialmedium.app.neoncrm.com/forms/waiver" target="_blank" class="text-cyan-600 font-bold underline">socialmedium.app.neoncrm.com/forms/waiver</a>
            </div>
            <button onclick="showStage('stage-search')" class="w-full max-w-md py-4 bg-gray-200 text-gray-700 rounded-2xl text-xl font-bold mx-auto block">Back</button>
        </div>

        <div id="stage-confirm" class="stage">
            <div id="nametag-confirm-preview" class="mb-8"></div>
            <div id="action-area"></div>
            <button onclick="showStage('stage-search')" class="mt-8 text-gray-400 font-semibold hover:underline">Start Over</button>
        </div>

        <div id="stage-success" class="stage">
            <div class="flex items-start justify-between w-full">
                <div class="flex-1 text-left">
                    <div class="flex items-center space-x-3 mb-2 text-green-600">
                        <span class="text-4xl">✅</span>
                        <h1 class="text-4xl font-bold">Success!</h1>
                    </div>
                    <p class="text-xl text-gray-600 mb-6" id="success-msg"></p>
                    <div id="nametag-final-preview"></div>

                    <div class="mt-8 bg-slate-50 p-6 rounded-2xl border border-slate-200 no-print">
                        <p class="font-bold text-slate-800 mb-4 text-xl">Attending a Club Today? (Optional)</p>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="logExtraClub('Cosplay Club Check-In', this)" class="py-3 bg-cyan-100 text-cyan-800 rounded-xl font-bold hover:bg-cyan-200 border border-cyan-300 transition-colors">Cosplay Club</button>
                            <button onclick="logExtraClub('Electronics Club Check-In', this)" class="py-3 bg-cyan-100 text-cyan-800 rounded-xl font-bold hover:bg-cyan-200 border border-cyan-300 transition-colors">Electronics Club</button>
                            <button onclick="logExtraClub('TTRPG Club Check-In', this)" class="py-3 bg-cyan-100 text-cyan-800 rounded-xl font-bold hover:bg-cyan-200 border border-cyan-300 transition-colors">TTRPG Club</button>
                            <button onclick="logExtraClub('Process Art Club Check-In', this)" class="py-3 bg-cyan-100 text-cyan-800 rounded-xl font-bold hover:bg-cyan-200 border border-cyan-300 transition-colors">Process Art Club</button>
                        </div>
                    </div>
                </div>

                <div class="ml-10 bg-cyan-50 p-6 rounded-3xl border border-cyan-100 text-center">
                    <p class="text-cyan-800 font-bold mb-4">Upcoming Events</p>
                    <div id="qrcode-events" class="mb-4 flex justify-center bg-white p-4 rounded-2xl"></div>
                    <p class="text-xs text-cyan-600 max-w-[150px] mx-auto">Scan to view our event calendar!</p>
                </div>
            </div>

            <div class="flex space-x-4 mt-8 no-print">
                <button onclick="window.print()" class="flex-1 py-5 bg-blue-600 text-white rounded-2xl text-2xl font-bold shadow-lg hover:bg-blue-700">Print Nametag</button>
                <button onclick="location.reload()" class="flex-1 py-5 bg-cyan-600 text-white rounded-2xl text-2xl font-bold hover:bg-cyan-700">Next Person <span id="timer">(30)</span></button>
            </div>
        </div>

        <div id="loader" class="hidden mt-6 flex flex-col items-center no-print">
            <div class="spinner"></div>
            <p class="mt-2 text-gray-500" id="loader-text">Processing...</p>
        </div>
    </div>

    <div id="nametag-to-print" class="hidden"></div>

    <script>
        const API_PROXY_URL = window.location.origin;
        const WAIVER_FIELD_ID = "87";
        const INTERESTS_FIELD_ID = "81";
        const CUSTOM_INTERESTS_FIELD_ID = "83";
        const SYSTEM_USER_ID = "3508"; 
        const WAIVER_URL = "https://socialmedium.app.neoncrm.com/forms/waiver";
        const EVENTS_URL = "https://socialmedium.app.neoncrm.com/np/constituent/eventList.do?orgId=socialmedium";
        let currentAccount = null;

        async function handleSearch() {
            const input = document.getElementById('search-input').value.trim();
            if (!input) return alert("Please enter an ID or Last Name.");
            setLoading(true, "Searching...");
            try {
                if (/^\d+$/.test(input)) {
                    await fetchAccountById(input);
                } else {
                    await searchAccountsByName(input);
                }
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                setLoading(false);
            }
        }

        async function fetchAccountById(id) {
            const res = await fetch(`${API_PROXY_URL}/api/v2/accounts/${id}`);
            const data = await res.json();
            if (!res.ok || !data.individualAccount) throw new Error("Account not found.");
            currentAccount = data.individualAccount;
            renderConfirmation();
        }

        async function searchAccountsByName(lastName) {
            const payload = {
                "searchFields": [{ "field": "Last Name", "operator": "EQUAL", "value": lastName }],
                "outputFields": ["First Name", "Last Name", "Account ID"],
                "pagination": { "currentPage": 0, "pageSize": 50 }
            };
            const response = await fetch(`${API_PROXY_URL}/api/v2/accounts/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const accounts = data.searchResults || [];
            if (accounts.length === 0) throw new Error("No accounts found.");
            if (accounts.length === 1) {
                await fetchAccountById(accounts[0]["Account ID"] || accounts[0].accountId);
            } else {
                renderResultsList(accounts);
            }
        }

        function renderResultsList(accounts) {
            const list = document.getElementById('results-list');
            list.innerHTML = "";
            accounts.forEach(acc => {
                const id = acc["Account ID"] || acc.accountId;
                const btn = document.createElement('button');
                btn.className = "w-full p-4 bg-gray-50 border border-gray-200 rounded-xl text-left hover:bg-cyan-50 mb-2";
                btn.innerHTML = `<strong>${acc["First Name"]} ${acc["Last Name"]}</strong><br><small>ID: ${id}</small>`;
                btn.onclick = () => fetchAccountById(id);
                list.appendChild(btn);
            });
            showStage('stage-results');
        }

        function generateNametagHTML() {
            const contact = currentAccount.primaryContact;
            const fields = currentAccount.accountCustomFields || [];
            const membership = currentAccount.accountCurrentMembershipStatus || "None";
            const pronouns = contact.gender ? contact.gender.name : "___________";
            const name = contact.preferredName || contact.firstName;

            const interestField = fields.find(f => f.id === INTERESTS_FIELD_ID);
            const interests = interestField && interestField.optionValues ? interestField.optionValues.map(o => o.name).join(", ") : "";
            const customInterestField = fields.find(f => f.id === CUSTOM_INTERESTS_FIELD_ID);
            const customInterests = customInterestField ? (customInterestField.value || "") : "";

            const combinedInterests = [interests, customInterests].filter(i => i !== "").join(", ");

            return `
                <div class="border-[12px] border-black rounded-[40px] p-12 text-left bg-white w-full max-w-3xl aspect-[3/2] flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start">
                            <div class="text-8xl font-black uppercase tracking-tighter text-black">${name}</div>
                            <div class="border-4 border-black rounded-full h-24 w-24 flex items-center justify-center text-center text-[12px] font-bold p-1 leading-none uppercase text-black">
                                ${membership}
                            </div>
                        </div>
                        <div class="text-3xl font-bold mt-4 text-black">Pronouns: ${pronouns}</div>
                    </div>
                    <div class="mt-8">
                        <div class="text-4xl font-black italic uppercase text-gray-300">I'm Nerdy for...</div>
                        <div class="text-3xl font-bold mt-2 leading-tight text-black">${combinedInterests || "Everything!"}</div>
                    </div>
                </div>
            `;
        }

        function renderConfirmation() {
            const preview = document.getElementById('nametag-confirm-preview');
            const actions = document.getElementById('action-area');
            const waiver = (currentAccount.accountCustomFields || []).find(f => f.id === WAIVER_FIELD_ID);
            const isSigned = (waiver && waiver.value && waiver.value.trim() !== "") || (waiver && waiver.optionValues && waiver.optionValues.length > 0);

            if (isSigned) {
                confirmCheckIn('Check-In');
                return;
            }

            preview.innerHTML = generateNametagHTML();
            actions.innerHTML = `<div class="bg-red-50 text-red-700 p-6 rounded-xl max-w-md mx-auto"><div id="qrcode-confirm" class="mb-6 flex justify-center bg-white p-4 rounded-lg inline-block mx-auto"></div><br><a href="${WAIVER_URL}" target="_blank" class="font-bold underline text-2xl">Sign Waiver</a></div>`;
                setTimeout(() => {
                    new QRCode(document.getElementById("qrcode-confirm"), { text: WAIVER_URL, width: 200, height: 200 });
                }, 50);
            }
            showStage('stage-confirm');
        }

        async function logExtraClub(subject, btn) {
            btn.disabled = true;
            btn.classList.replace('bg-cyan-100', 'bg-slate-200');
            btn.classList.replace('text-cyan-800', 'text-slate-500');
            btn.classList.replace('hover:bg-cyan-200', 'cursor-default');
            btn.textContent = "Logging...";
            
            const now = new Date();
            const dateOptions = { timeZone: 'America/Los_Angeles', year: 'numeric', month: '2-digit', day: '2-digit' };
            const parts = new Intl.DateTimeFormat('en-US', dateOptions).formatToParts(now);
            const d = `${parts.find(p => p.type === 'year').value}-${parts.find(p => p.type === 'month').value}-${parts.find(p => p.type === 'day').value}`;
            const t = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false, hourCycle: 'h23', hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const payload = {
                "subject": subject,
                "activityDates": { "startDate": d, "startTime": t, "timeZone": { "id": "1" } },
                "clientAccount": [{ "accountId": String(currentAccount.accountId) }],
                "systemUserId": [ String(SYSTEM_USER_ID) ],
                "status": { "id": "4" },
                "priority": "Low"
            };

            try {
                const response = await fetch(`${API_PROXY_URL}/api/v2/activities`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("Check-in failed");
                btn.classList.replace('bg-slate-200', 'bg-green-100');
                btn.classList.replace('text-slate-500', 'text-green-800');
                btn.textContent = "✅ Logged!";
            } catch (e) {
                btn.textContent = "❌ Error";
            }
        }

        async function confirmCheckIn(subject = "Check-In") {
            setLoading(true, `Logging ${subject}...`);
            const now = new Date();
            const dateOptions = { timeZone: 'America/Los_Angeles', year: 'numeric', month: '2-digit', day: '2-digit' };
            const parts = new Intl.DateTimeFormat('en-US', dateOptions).formatToParts(now);
            const d = `${parts.find(p => p.type === 'year').value}-${parts.find(p => p.type === 'month').value}-${parts.find(p => p.type === 'day').value}`;
            const t = now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false, hourCycle: 'h23', hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const payload = {
                "subject": subject,
                "activityDates": { "startDate": d, "startTime": t, "timeZone": { "id": "1" } },
                "clientAccount": [{ "accountId": String(currentAccount.accountId) }],
                "systemUserId": [ String(SYSTEM_USER_ID) ],
                "status": { "id": "4" },
                "priority": "Low"
            };

            try {
                const response = await fetch(`${API_PROXY_URL}/api/v2/activities`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("Check-in failed");
                
                document.getElementById('success-msg').textContent = `${currentAccount.primaryContact.firstName} successfully logged: ${subject}`;
                
                const finalTagHTML = generateNametagHTML();
                document.getElementById('nametag-final-preview').innerHTML = finalTagHTML;
                document.getElementById('nametag-to-print').innerHTML = finalTagHTML;
                
                showStage('stage-success');
                
                // RESTORED: Generate Events QR Code on Success
                const eventContainer = document.getElementById("qrcode-events");
                eventContainer.innerHTML = "";
                new QRCode(eventContainer, { text: EVENTS_URL, width: 180, height: 180 });
                
                startResetTimer();
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                setLoading(false);
            }
        }

        function startResetTimer() {
            let timeLeft = 30;
            const timerEl = document.getElementById('timer');
            const interval = setInterval(() => {
                timeLeft--;
                if (timerEl) timerEl.textContent = `(${timeLeft})`;
                if (timeLeft <= 0) { clearInterval(interval); location.reload(); }
            }, 1000);
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active-stage'));
            document.getElementById(id).classList.add('active-stage');
        }

        function setLoading(show, text) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('loader-text').textContent = text;
        }

        function showWaiverOnly() {
            showStage('stage-waiver');
            const container = document.getElementById("qrcode-direct");
            container.innerHTML = "";
            new QRCode(container, { text: WAIVER_URL, width: 250, height: 250 });
        }
    </script>
</body>
</html>
