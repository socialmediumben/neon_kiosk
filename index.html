<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon CRM Test Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stage { display: none; }
        .active-stage { display: block; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #0891b2; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-lg text-center">
        <div id="stage-search" class="stage active-stage">
            <h1 class="text-4xl font-bold text-gray-800">Test Search</h1>
            <p class="text-gray-500 my-4">Search by phone digits (e.g. 5551234567)</p>
            <input type="tel" id="search-input" class="w-full p-4 text-2xl border rounded-md mb-4 text-center" placeholder="Phone Number">
            <button onclick="searchAccounts()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-xl hover:bg-blue-700 transition">Search Neon</button>
        </div>

        <div id="stage-results" class="stage text-left">
            <h1 class="text-2xl font-bold mb-6 text-center">Search Results</h1>
            <div id="results-list" class="space-y-6"></div>
            <button onclick="showStage('stage-search')" class="mt-8 w-full py-4 border-2 rounded-xl text-xl">New Search</button>
        </div>

        <div id="loader" class="hidden mt-6 flex flex-col items-center">
            <div class="spinner"></div>
            <p class="mt-2 text-gray-500">Communicating with Neon...</p>
        </div>
    </div>

    <script>
        const API_PROXY_URL = window.location.origin;

        async function searchAccounts() {
            const phone = document.getElementById('search-input').value.replace(/\D/g, '');
            if (phone.length < 4) return alert("Enter at least 4 digits.");

            document.getElementById('loader').classList.remove('hidden');
            
            try {
                const res = await fetch(`${API_PROXY_URL}/api/v2/accounts/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        searchFields: [{ field: "Phone", operator: "CONTAIN", value: phone }],
                        outputFields: [
                            "First Name", 
                            "Last Name", 
                            "Account ID", 
                            "Account Custom Fields", 
                            "Common Custom Fields", 
                            "Individual Custom Fields"
                        ]
                    })
                });
                const data = await res.json();
                renderResults(data.searchResults || []);
            } catch (e) { 
                alert("Error: " + e.message); 
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderResults(accounts) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            
            if (accounts.length === 0) {
                list.innerHTML = '<p class="text-center text-red-500 font-bold">No accounts found in Neon CRM for those digits.</p>';
            }

            accounts.forEach(acc => {
                const div = document.createElement('div');
                div.className = "p-4 border-2 rounded-xl bg-slate-50";
                
                // Combine all possible fields to see what data is actually coming through
                const allFields = [
                    ...(acc["Account Custom Fields"] || []), 
                    ...(acc["Common Custom Fields"] || []),
                    ...(acc["Individual Custom Fields"] || [])
                ];

                const fieldSummary = allFields.length > 0 
                    ? allFields.map(f => `<li><strong>${f.fieldName}:</strong> ${f.value}</li>`).join('')
                    : "<li>No custom fields found</li>";

                div.innerHTML = `
                    <div class="text-xl font-bold text-blue-800">${acc["First Name"]} ${acc["Last Name"]}</div>
                    <div class="text-sm text-gray-500 mb-2">Account ID: ${acc["Account ID"]}</div>
                    <div class="bg-white p-3 border rounded text-xs font-mono">
                        <p class="font-bold border-b mb-1">Detected Custom Fields:</p>
                        <ul class="list-disc ml-4">
                            ${fieldSummary}
                        </ul>
                    </div>
                `;
                list.appendChild(div);
            });
            showStage('stage-results');
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active-stage'));
            document.getElementById(id).classList.add('active-stage');
        }
    </script>
</body>
</html>
