<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon CRM Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stage { display: none; }
        .active-stage { display: block; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #0891b2; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-lg text-center">
        <div id="stage-search" class="stage active-stage">
            <h1 class="text-4xl font-bold">Welcome</h1>
            <p class="text-gray-500 my-4">Enter phone number to check in</p>
            <input type="tel" id="search-input" class="w-full p-4 text-2xl border rounded mb-4" placeholder="(555) 555-5555">
            <button onclick="searchAccounts()" class="w-full py-4 bg-cyan-600 text-white rounded-xl text-xl">Search</button>
        </div>

        <div id="stage-results" class="stage">
            <h1 class="text-3xl font-bold mb-6">Who is here?</h1>
            <div id="results-list" class="space-y-4"></div>
            <button onclick="checkInSelected()" id="checkin-btn" disabled class="mt-8 w-full py-4 bg-gray-400 text-white rounded-xl text-xl">Check In</button>
        </div>

        <div id="stage-success" class="stage">
            <h1 class="text-4xl font-bold text-green-600">Success!</h1>
            <p class="my-6 text-xl">You are checked in.</p>
            <button onclick="location.reload()" class="w-full py-4 bg-cyan-600 text-white rounded-xl">Done</button>
        </div>

        <div id="loader" class="hidden mt-4 flex justify-center items-center"><div class="spinner"></div></div>
    </div>

    <script>
        const API_PROXY_URL = 'PASTE_YOUR_RENDER_URL_HERE'; 
        const WAIVER_FIELD_ID = 'PASTE_FIELD_ID_HERE'; // Find this via /discovery/fields
        const SYSTEM_USER_ID = "1153";

        let selectedAccounts = [];

        async function searchAccounts() {
            const phone = document.getElementById('search-input').value.replace(/\D/g, '');
            document.getElementById('loader').classList.remove('hidden');
            
            try {
                // Neon Search Individual Accounts
                const res = await fetch(`${API_PROXY_URL}/api/v2/accounts/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        searchFields: [{ field: "Phone", operator: "CONTAIN", value: phone }],
                        outputFields: ["First Name", "Last Name", "Account ID", "Waiver Agreement"]
                    })
                });
                const data = await res.json();
                renderResults(data.searchResults || []);
            } catch (e) { alert("Search Error: " + e.message); }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderResults(accounts) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            accounts.forEach(acc => {
                const div = document.createElement('div');
                div.className = "p-4 border-2 rounded-xl cursor-pointer text-xl font-bold";
                div.textContent = `${acc["First Name"]} ${acc["Last Name"]}`;
                div.onclick = () => {
                    div.classList.toggle('bg-cyan-50');
                    div.classList.toggle('border-cyan-600');
                    toggleSelect(acc);
                };
                list.appendChild(div);
            });
            showStage('stage-results');
        }

        function toggleSelect(acc) {
            const idx = selectedAccounts.indexOf(acc);
            if(idx > -1) selectedAccounts.splice(idx, 1);
            else selectedAccounts.push(acc);
            document.getElementById('checkin-btn').disabled = selectedAccounts.length === 0;
            document.getElementById('checkin-btn').className = selectedAccounts.length === 0 ? "mt-8 w-full py-4 bg-gray-400 text-white rounded-xl text-xl" : "mt-8 w-full py-4 bg-cyan-600 text-white rounded-xl text-xl";
        }

        async function checkInSelected() {
            const now = new Date();
            for (const acc of selectedAccounts) {
                // Create Neon Activity
                await fetch(`${API_PROXY_URL}/api/v2/activities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: "Check-In",
                        status: "Completed",
                        accountId: acc["Account ID"],
                        assignedTo: SYSTEM_USER_ID,
                        startDate: now.toISOString().split('T')[0],
                        startTime: now.toTimeString().split(' ')[0].substring(0, 5)
                    })
                });
            }
            showStage('stage-success');
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active-stage'));
            document.getElementById(id).classList.add('active-stage');
        }
    </script>
</body>
</html>
