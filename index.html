<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Phone Key Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl text-center">
        <h1 class="text-2xl font-bold mb-6">Find the Correct Phone Key</h1>
        
        <input type="tel" id="phone-input" class="w-full p-4 border rounded-lg mb-6 text-center text-xl" placeholder="8186466823">
        
        <div class="grid grid-cols-1 gap-3">
            <button onclick="testKey('Phone')" class="py-3 bg-blue-600 text-white rounded-lg font-bold">Try Key: "Phone"</button>
            <button onclick="testKey('Mobile Phone')" class="py-3 bg-indigo-600 text-white rounded-lg font-bold">Try Key: "Mobile Phone"</button>
            <button onclick="testKey('Work Phone')" class="py-3 bg-cyan-600 text-white rounded-lg font-bold">Try Key: "Work Phone"</button>
        </div>

        <div class="mt-8 p-4 bg-black rounded-lg text-left">
            <p class="text-green-400 font-mono text-xs uppercase mb-2">Response for <span id="active-key">...</span>:</p>
            <pre id="console" class="text-white font-mono text-sm overflow-auto max-h-64">Select a key to test.</pre>
        </div>
    </div>

    <script>
        async function testKey(keyName) {
            const val = document.getElementById('phone-input').value.replace(/\D/g, '');
            const output = document.getElementById('console');
            document.getElementById('active-key').textContent = keyName;
            output.textContent = "Testing...";
            
            try {
                const res = await fetch(`${window.location.origin}/api/v2/accounts/search?userType=INDIVIDUAL`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pagination: { currentPage: 0, pageSize: 5 },
                        searchFields: [{
                            field: keyName,
                            operator: "CONTAIN",
                            value: val
                        }],
                        outputFields: ["First Name", "Last Name", "Account ID"]
                    })
                });
                
                const data = await res.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                output.textContent = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
