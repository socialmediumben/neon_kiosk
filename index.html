<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon CRM Simple Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div id="main-container" class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-lg text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Neon Connection Test</h1>
        
        <div id="status-box" class="p-6 border-2 border-dashed rounded-xl bg-gray-50 text-left">
            <p class="text-sm font-bold text-gray-500 uppercase mb-4">API Response Status:</p>
            <div id="api-output" class="font-mono text-sm break-all">Initializing...</div>
        </div>

        <button onclick="fetchAccountList()" class="mt-8 w-full py-4 bg-blue-600 text-white rounded-xl text-xl font-bold">
            Fetch Account List (GET)
        </button>
    </div>

    <script>
        const API_PROXY_URL = window.location.origin;

        // Auto-run on load to see if we can get anything
        window.onload = fetchAccountList;

        async function fetchAccountList() {
            const output = document.getElementById('api-output');
            output.innerHTML = "Requesting /v2/accounts...";

            try {
                // Using the simpler GET endpoint you discovered
                const res = await fetch(`${API_PROXY_URL}/api/v2/accounts?pageSize=5&userType=INDIVIDUAL`);
                const data = await res.json();

                if (res.ok && data.accounts && data.accounts.length > 0) {
                    let html = `<p class="text-green-600 font-bold mb-2">✅ Success! Found ${data.pagination.totalResults} accounts.</p><ul class="list-disc ml-5">`;
                    data.accounts.forEach(acc => {
                        html += `<li>${acc.firstName} ${acc.lastName} (ID: ${acc.accountId})</li>`;
                    });
                    html += `</ul>`;
                    output.innerHTML = html;
                } else if (res.status === 401 || res.status === 403) {
                    output.innerHTML = `<span class="text-red-600 font-bold">❌ Permission Denied (${res.status}).</span><br>Your API Key is valid, but doesn't have permission to list accounts.`;
                } else {
                    output.innerHTML = `<span class="text-orange-600 font-bold">⚠️ Connected, but empty.</span><br>Neon returned 0 results. Check if there are active 'Individual' accounts in your CRM.`;
                }
            } catch (e) {
                output.innerHTML = `<span class="text-red-500 font-bold">❌ Connection Failed:</span> ${e.message}`;
            }
        }
    </script>
</body>
</html>
